<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Eye - Chat RAG</title>
    <link rel="stylesheet" href="/static/css/rag.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div id="main">
        <!-- Header -->
        <div id="header">
            <h1>AI Assistant</h1>
            <div id="connection-status" class="status-connected">● Conectado</div>
        </div>

        <!-- Área de mensajes -->
        <div id="linescontainer">
            <div id="lines"></div>
        </div>

        <!-- Input Fijo Abajo -->
        <div id="bottombar">
            <div id="input-hint">
                <span>Presiona <kbd>Shift</kbd> + <kbd>Enter</kbd> para saltar de línea</span>
            </div>
            <div id="chatinputcontainer">
                <form onsubmit="return submitText();">
                    <span
                        id="chatinput"
                        class="textarea"
                        contenteditable="true"
                        placeholder="Escribe tu pregunta aquí..."
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this)"
                    ></span>
                    <button type="submit" id="send-btn">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Loading Bar -->
    <div id="loadingbar" style="display: none;">
        <div class="loading-bar"></div>
        <span id="loading-text">Escribiendo respuesta...</span>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
