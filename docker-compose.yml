
services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- PROCESADOR DE DOCUMENTOS (Ingesta) ---
  setup-rag:
    build: .
    container_name: setup_rag
    user: root
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./data/chroma:/app/data/chroma  # Persistencia de la DB
      - ./app/docs:/app/docs                # Tus PDFs en Windows
    command: >
      sh -c "echo 'Iniciando descarga de modelos y procesamiento...' && 
             curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3.2\"}' && 
             curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}' && 
             python ingest.py"

  # --- API PRINCIPAL ---
  rag_api:
    build: .
    container_name: rag_api
    user: root
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - .:/app                          # Sincroniza tu main.py
      - ./data/chroma:/app/data/chroma  # Lee la DB creada por setup-rag
    depends_on:
      setup-rag:
        condition: service_completed_successfully
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

